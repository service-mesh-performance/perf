<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel Performance Platform - Meshery Login</title>
    <style>
        :root {
            /* Intel Branding Colors */
            --intel-blue: #0068B5;
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6b7280;
            
            /* Warning Colors */
            --warning-bg: #fee2e2;
            --warning-text: #991b1b;
            --warning-border: #ef4444;
            
            /* Disabled Input Colors */
            --disabled-bg: #f3f4f6;
            --disabled-text: #9ca3af;
            --disabled-border: #d1d5db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px 35px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            max-width: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0 0 25px 0;
        }

        .warning-box {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            border-left: 4px solid var(--warning-border);
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.5;
        }

        .warning-box strong {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--disabled-border);
            border-radius: 4px;
            box-sizing: border-box;
            background-color: var(--disabled-bg);
            color: var(--disabled-text);
            font-size: 0.95rem;
            cursor: not-allowed;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: var(--disabled-text);
            opacity: 0.7;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--intel-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            opacity: 0.5;
            cursor: not-allowed;
            margin-top: 10px;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="/intel.png"  alt="Intel Logo" class="logo">
    
    <h1>Intel Performance Platform</h1>
    <p class="subtitle">Meshery Remote Provider</p>

    <div class="warning-box">
        <strong>⚠️ Access Restricted</strong>
        Access to this Meshery remote provider is strictly limited to Intel-internal networks only. Authentication is currently disabled.
    </div>

    <form onsubmit="event.preventDefault();">
        <div class="form-group">
            <label for="username">Corporate Email</label>
            <input type="text" id="username" name="username" placeholder="user@intel.com" disabled>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" disabled>
        </div>
        
        <button type="submit" disabled>Sign In</button>
    </form>
</div>

</body>
</html>
